<!DOCTYPE html>
<html>
<head>
<title>Learning Sound Page</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f4f4f4;
  margin: 0;
}

h1 {
  margin: 10px;
  font-size: 22px;
}

.section-title {
  margin-top: 20px;
  font-size: 18px;
}

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  padding: 10px;
}

/* SMALL BOX */
.box {
  width: 70px;
  height: 70px;
  margin: 6px;
  border-radius: 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: bold;
  font-size: 12px;
  text-align: center;
  box-shadow: 0 0 5px gray;
  transition: 0.2s;
}

.box:hover {
  transform: scale(1.1);
}

/* NAME SECTION SMALL */
.name-box {
  margin: 15px;
  padding: 15px;
  background: white;
  border-radius: 15px;
  box-shadow: 0 0 10px gray;
}

.name {
  font-size: 18px;
  color: #ff4b5c;
  cursor: pointer;
  font-weight: bold;
}

#message {
  margin-top: 10px;
  font-size: 14px;
}

/* RESPONSIVE */
@media (max-width: 600px) {
  .box {
    width: 60px;
    height: 60px;
    font-size: 10px;
  }
}
</style>
</head>

<body>

<h1>🎨 Learning Sound Page</h1>

<!-- COLORS -->
<div class="section-title">Colors</div>
<div class="container">
  <div class="box" style="background:red;" onclick="speak('Red')">Red</div>
  <div class="box" style="background:blue;" onclick="speak('Blue')">Blue</div>
  <div class="box" style="background:green;" onclick="speak('Green')">Green</div>
  <div class="box" style="background:yellow; color:black;" onclick="speak('Yellow')">Yellow</div>
  <div class="box" style="background:purple;" onclick="speak('Purple')">Purple</div>
  <div class="box" style="background:orange;" onclick="speak('Orange')">Orange</div>
  <div class="box" style="background:black;" onclick="speak('Black')">Black</div>
  <div class="box" style="background:pink;" onclick="speak('Pink')">Pink</div>
</div>

<!-- A-Z -->
<div class="section-title">A - Z</div>
<div class="container" id="alphabetContainer"></div>

<!-- ABCD -->
<div class="section-title">ABCD</div>
<div class="container" id="abcdContainer"></div>

<!-- NAME -->
<div class="name-box">
  <div class="name" onclick="speakText()">Hiyashree Loying</div>
  <div id="message"></div>
</div>

<script>
// SPEAK FUNCTION
function speak(text) {
  let speech = new SpeechSynthesisUtterance(text);
  speech.lang = "en-US";
  speech.rate = 1;
  speech.pitch = 1;

  speechSynthesis.cancel();
  speechSynthesis.speak(speech);
}

// RANDOM COLOR
function getRandomColor() {
  const colors = ["red","blue","green","purple","orange","teal","brown","pink"];
  return colors[Math.floor(Math.random() * colors.length)];
}

// A-Z
const alpha = document.getElementById("alphabetContainer");

for (let i = 65; i <= 90; i++) {
  let letter = String.fromCharCode(i);

  let div = document.createElement("div");
  div.className = "box";
  div.style.background = getRandomColor();
  div.innerText = letter;
  div.onclick = () => speak(letter);

  alpha.appendChild(div);
}

// ABCD
const abcdData = [
"A for Apple","B for Ball","C for Cat","D for Dog","E for Elephant",
"F for Fish","G for Goat","H for Hen","I for Ice Cream","J for Jug",
"K for Kite","L for Lion","M for Mango","N for Nest","O for Orange",
"P for Parrot","Q for Queen","R for Rabbit","S for Sun","T for Tiger",
"U for Umbrella","V for Van","W for Watch","X for X-ray","Y for Yak","Z for Zebra"
];

const abcd = document.getElementById("abcdContainer");

abcdData.forEach(item => {
  let div = document.createElement("div");
  div.className = "box";
  div.style.background = getRandomColor();
  div.innerText = item;
  div.onclick = () => speak(item);

  abcd.appendChild(div);
});

// NAME SPEAK
function speakText() {
  let text = "Hello I am Hiyashree Loying";
  document.getElementById("message").innerText = text;
  speak(text);
}
</script>

</body>
</html>
